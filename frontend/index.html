<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="app.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>WIFI - Manager</h1>
    </header>
    <main>
      <div id="idInput">
        <select name="kurse" id="idKurse">
          <option value="">Auswählen</option>
          <option value="1">Gebäudetechnik</option>
          <option value="2">Informatik</option>
          <option value="3">Mechatronik</option>
        </select>
        <br />
        <label for="idName">Namen eingeben:</label>
        <input type="text" id="idName"/>
        <br />
        <label for="idMail">Email eingeben</label>
        <input type="email" id="idMail"/>
        <br />
        <label for="idCredit">Kreditkarte</label>
        <input type="radio" name="credit" id="idCredit"/>
        <br />
        <label for="idPayPal">PayPal</label>
        <input type="radio" name="payPal" id="idPayPal"/>
        <br />
        <label for="idKlarna">Klarna</label>
        <input type="radio" name="klarna" id="idKlarna"/>
        <br />
        <button type="button">Einschreiben</button>
        <br />
        <button type="button">Austragen</button>
        <br />
        <button type="button">Meine Kurse</button>
        <br />
        <button type="button">Alle Kurse</button>
        <br />
      </div>
      <div id="idOutput">
        
        Card Output

        <div class="myCourses">
            <h3>Chris</h3>
            <p>Kurs Einschreibungen</p>
            <ul>
                <li>Gebäudetechnik</li>
                <li>Mechatronik</li>
            </ul>
        </div>

        <div class="subscriptions">
            <h3>Gebäudetechnik</h3>
            <p>Kunden Einschreibungen</p>
            <ul>
                <li>Chris</li>
                <li>John</li>
                <li>Marly</li>
            </ul>
        </div>
      </div>
    </main>
    <footer>
      <p>Copyright by Chris Kross</p>
    </footer>
  </body>
</html>
